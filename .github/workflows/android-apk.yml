name: Build signed APK

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      CI_SIGNING: "true"
      CI_KEYSTORE_PATH: ${{ github.workspace }}/ci-release.jks
      CI_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      CI_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      CI_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Check Android SDK tools
        run: |
          command -v sdkmanager
          test -n "$ANDROID_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$CI_KEYSTORE_PASSWORD"
          test -n "$CI_KEY_ALIAS"
          test -n "$CI_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$CI_KEYSTORE_PATH"

      - name: Build release APK
        run: gradle --build-cache :app:assembleRelease

      - name: Rename release APK
        run: |
          APK_PATH="$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | head -n 1)"
          TARGET_PATH="app/build/outputs/apk/release/armored-age-${GITHUB_REF_NAME}.apk"
          mv "$APK_PATH" "$TARGET_PATH"
          echo "RELEASE_APK_PATH=$TARGET_PATH" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: armored-age-${{ github.ref_name }}.apk
          path: ${{ env.RELEASE_APK_PATH }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.RELEASE_APK_PATH }}
          generate_release_notes: true
