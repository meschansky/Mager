name: Build signed APK

on:
  push:
    tags:
      - "*"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      CI_SIGNING: "true"
      CI_KEYSTORE_PATH: ${{ github.workspace }}/ci-release.jks
      CI_KEYSTORE_PASSWORD: android
      CI_KEY_ALIAS: ci
      CI_KEY_PASSWORD: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Generate self-signed keystore
        run: |
          keytool -genkeypair \
            -storetype JKS \
            -keystore "$CI_KEYSTORE_PATH" \
            -alias "$CI_KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$CI_KEYSTORE_PASSWORD" \
            -keypass "$CI_KEY_PASSWORD" \
            -dname "CN=CI,O=ArmoredAge,C=US"

      - name: Build release APK
        run: gradle :app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: armored-age-release-apk
          path: app/build/outputs/apk/release/*.apk
